<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai-Cup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
    <span class="brand-name">☕ Chai-Cup</span>

    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
    <a href="/profile">Profile</a>
</header>

    <!-- Login Container -->
    <main class="container">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to continue to Chai-Cup</p>

        <form>
            <label for="username" class="label">Username</label>
            <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter your username"
                class="input"
                required
            >

            <label for="password" class="label">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                class="input"
                required
            >

            <button type="submit">Login</button>

            <p class="signup-text">
                Don't have an account?
                <a href="/signup">Sign Up</a>
            </p>
        </form>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Chai-Cup. All Rights Reserved.</p>
    </footer>

</body>
</html>
